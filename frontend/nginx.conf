server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker-interner DNS-Resolver. Zusammen mit dem variablen Upstream unten löst
    # nginx den "app"-Host erst zur Request-Zeit auf – nicht beim Start. Verhindert
    # den "host not found in upstream" emerg-Crash, wenn der app-Container beim
    # Frontend-Start noch nicht im Netzwerk erreichbar ist (Deploy-Race).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API-Proxying: leitet /api/* an den Backend-Container weiter
    location /api/ {
        set $upstream_app app;
        proxy_pass http://$upstream_app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-Support für Chat-Streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # Health-Check ebenfalls weiterleiten
    location /health {
        set $upstream_health app;
        proxy_pass http://$upstream_health:3000;
    }

    # Statische Dateien ausliefern (Vite-Build)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
