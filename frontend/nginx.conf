server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Upload-Limit hochsetzen: ohne diese Direktive gilt der nginx-Default von 1 MB
    # und große Dokument-Uploads (PDFs mit hunderten/tausenden Seiten) scheitern mit
    # HTTP 413, bevor sie das Backend erreichen. 512m deckt auch den IPCC-Report ab.
    client_max_body_size 512m;

    # Docker-interner DNS-Resolver. Zusammen mit dem variablen Upstream unten löst
    # nginx den "app"-Host erst zur Request-Zeit auf – nicht beim Start. Verhindert
    # den "host not found in upstream" emerg-Crash, wenn der app-Container beim
    # Frontend-Start noch nicht im Netzwerk erreichbar ist (Deploy-Race).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API-Proxying: leitet /api/* an den Backend-Container weiter
    location /api/ {
        set $upstream_app app;
        proxy_pass http://$upstream_app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-Support für Chat-Streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # Health-Check ebenfalls weiterleiten
    location /health {
        set $upstream_health app;
        proxy_pass http://$upstream_health:3000;
    }

    # Gehashte Build-Assets: Dateiname ändert sich bei jedem Build → dauerhaft
    # cachebar. Fehlt eine Datei (alter Chunk nach Redeploy), sauberer 404 statt
    # index.html-Fallback – so bekommt der Browser kein HTML als JS-Modul.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html nie cachen: hält die Referenzen auf die aktuellen Chunk-Hashes.
    # Ohne no-cache lädt ein offenes Tab nach einem Deploy weiter die alten,
    # gelöschten Chunks und der Lazy-Import schlägt fehl.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA-Fallback für App-Routen (/chat, /workspaces, ...)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
