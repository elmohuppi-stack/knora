services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # Kein Host-Port nötig: Das Frontend (nginx) proxied /api/ intern zu app:3000
    # über das appnet-Netzwerk. Ein Host-Mapping würde mit FRONTEND_PORT kollidieren,
    # wenn WEB_PORT == FRONTEND_PORT gesetzt ist.
    # ports:
    #   - "127.0.0.1:${WEB_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-knora}:${DB_PASSWORD:-changeme}@knora-db:5432/knora
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      PARSER_URL: http://parser:8000/parse
      PORT: 3000
      # YouTube-Transkript-Provider (Apify/Supadata) – von Hetzner-IPs ist YouTube gesperrt,
      # daher muss der externe Provider aus der .env in den Container durchgereicht werden.
      YOUTUBE_TRANSCRIPT_PROVIDER: ${YOUTUBE_TRANSCRIPT_PROVIDER:-}
      APIFY_API_KEY: ${APIFY_API_KEY:-}
      SUPADATA_API_KEY: ${SUPADATA_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Große Uploads werden mehrfach in den RAM kopiert (parseBody → arrayBuffer → Blob).
    # Ohne Limit kann ein Riesen-Upload den Host-RAM sprengen; mit Limit fällt im
    # Zweifel nur dieser Container (kontrollierter OOM-Restart), nicht der ganze Server.
    mem_limit: 2g
    networks:
      - appnet
      - hetzner-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3084}:80"
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped
    networks:
      - appnet
      - hetzner-network

  db:
    image: pgvector/pgvector:pg17
    volumes:
      - data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER:-knora}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: knora
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-knora}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      appnet:
        aliases:
          - knora-db

  # Parser wird für PDF/DOCX/HTML-Import zwingend gebraucht und läuft daher immer mit
  # (kein Profil-Gate mehr – sonst startet ihn `docker compose up -d --build` beim
  # Deploy nicht und der Import bricht ab). PARSER_URL im app-Service zeigt auf parser:8000.
  parser:
    build: ./parser
    environment:
      PORT: 8000
    restart: unless-stopped
    # MarkItDown/pdfminer lädt das komplette PDF in den RAM; sehr große Dokumente
    # (tausende Seiten) können mehrere GB belegen. Limit deckelt den Verbrauch, damit
    # ein Ausreißer den Host nicht mitreißt. Bei Bedarf für den IPCC-Report erhöhen.
    mem_limit: 4g
    networks:
      - appnet

volumes:
  data:

networks:
  appnet:
  hetzner-network:
    external: true
