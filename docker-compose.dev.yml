services:
  db:
    image: pgvector/pgvector:pg17
    volumes:
      - dev-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: knora
      POSTGRES_PASSWORD: knora-dev
      POSTGRES_DB: knora
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knora"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - devnet

  parser:
    build: ./parser
    profiles: ["parser"]
    ports:
      - "8001:8000"
    volumes:
      - ./parser:/app
    environment:
      PORT: 8000
    restart: unless-stopped
    networks:
      - devnet

volumes:
  dev-data:

networks:
  devnet:
